<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Imposter Game - Превью ролей</title>
    <script>window.GAME_DATA = {};</script>
    <style>
        :root {
            --bg-color: #ffffff;
            --secondary-bg: #f4f4f7;
            --text-color: #000000;
            --hint-color: #999999;
            --button-color: #2481cc;
            --button-text: #ffffff;
            --card-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        body { 
            font-family: -apple-system, system-ui, sans-serif; 
            background: var(--secondary-bg); 
            margin: 0; 
            padding: 40px; 
            color: var(--text-color); 
        }

        .header { 
            text-align: center; 
            margin-bottom: 60px; 
            padding: 30px; 
            background: white; 
            border-radius: 20px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); 
        }

        .category-section { margin-bottom: 80px; }
        
        .category-title { 
            font-size: 32px; 
            font-weight: 800;
            border-bottom: 4px solid var(--button-color); 
            padding-bottom: 12px; 
            margin-bottom: 40px; 
            display: flex; 
            align-items: center; 
            gap: 20px; 
        }

        .stats { font-size: 16px; color: var(--hint-color); font-weight: normal; }

        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
            gap: 40px; 
            justify-items: center;
        }

        /* Точная копия игрового стиля кнопки удержания */
        .hold-btn {
            width: 280px;
            height: 280px;
            border-radius: 50%;
            background: var(--button-color);
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 20px;
            border: 8px solid var(--bg-color);
            box-shadow: var(--card-shadow);
            text-align: center;
            padding: 0;
            overflow: hidden;
            position: relative;
        }

        .role-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            top: 0;
            left: 0;
            opacity: 1; /* Как в игре при удержании */
        }

        .role-content {
            position: relative;
            z-index: 2;
            padding: 20px;
        }

        .role-label {
            font-size: 14px; 
            opacity: 0.9; 
            font-weight: 400; 
            text-shadow: 0 1px 4px rgba(0,0,0,0.5);
            display: block;
            margin-bottom: 4px;
        }

        .word-text {
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
            font-size: 22px;
            display: block;
            line-height: 1.2;
        }

        #loading-status { 
            position: fixed; 
            bottom: 30px; 
            right: 30px; 
            background: var(--button-color); 
            color: white; 
            padding: 12px 25px; 
            border-radius: 30px; 
            font-weight: 600;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
            z-index: 1000;
        }
    </style>
</head>
<body>

<div class="header">
    <h1>📱 Игровое превью ролей</h1>
    <p>Так карточки выглядят для игроков в момент просмотра слова</p>
</div>

<div id="viewer-root"></div>
<div id="loading-status">Загрузка данных...</div>

<script>
    const viewerRoot = document.getElementById('viewer-root');
    const loadingStatus = document.getElementById('loading-status');

    function loadScript(src) {
        return new Promise((resolve) => {
            const script = document.createElement('script');
            script.src = src;
            script.onload = resolve;
            document.head.appendChild(script);
        });
    }

    async function init() {
        loadingStatus.style.display = 'block';
        await loadScript('libs/registry.js');
        for (const cat of window.GAME_REGISTRY) {
            loadingStatus.innerText = `Загрузка: ${cat.name}...`;
            await loadScript(`libs/${cat.file}.js`);
            const words = window.GAME_DATA[cat.name];
            if (words) renderCategory(cat.name, words);
        }
        loadingStatus.innerText = 'Все готово!';
        setTimeout(() => loadingStatus.style.display = 'none', 2000);
    }

    function renderCategory(name, words) {
        const section = document.createElement('div');
        section.className = 'category-section';
        section.innerHTML = `
            <div class="category-title">${name} <span class="stats">Слов: ${words.length}</span></div>
            <div class="grid">${words.map(w => renderRoleCard(w)).join('')}</div>
        `;
        viewerRoot.appendChild(section);
    }

    function renderRoleCard(word) {
        const name = typeof word === 'object' ? word.name : word;
        const imgUrl = typeof word === 'object' ? word.image : '';
        
        return `
            <div class="hold-btn">
                ${imgUrl ? `<img src="${imgUrl}" class="role-image" loading="lazy" alt="${name}">` : ''}
                <div class="role-content">
                    <span class="role-label">ТВОЕ СЛОВО:</span>
                    <span class="word-text">${name}</span>
                </div>
            </div>
        `;
    }

    init();
</script>

</body>
</html>
